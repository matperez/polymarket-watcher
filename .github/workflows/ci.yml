name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install watcher
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      - name: Pytest
        run: pytest tests/ -v
